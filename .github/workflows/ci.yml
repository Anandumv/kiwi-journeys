name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Stub env vars so Next.js build doesn't fail at import time.
          DATABASE_URL: "postgresql://user:pass@localhost:5432/ci"
          AUTH_SECRET: "ci-secret-not-real-32-bytes-xxxx"
          STRIPE_SECRET_KEY: "sk_test_ci_placeholder"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_ci_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_ci_placeholder"
          NEXT_PUBLIC_BASE_URL: "https://example.com"
          CRON_SECRET: "ci-cron-secret"
